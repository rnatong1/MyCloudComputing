<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>AI 분석 결과</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f6fb; margin: 0; padding: 40px 20px; }
    .container { max-width: 700px; margin: 0 auto; background: white; border-radius: 12px; padding: 40px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    h1 { font-size: 22px; margin-bottom: 4px; color: #1E2761; }
    .hint { font-size: 12px; color: #999; }
    .result-wrap { margin-bottom: 28px; }
    .result-image { text-align: center; margin-bottom: 24px; }
    .result-image img { max-width: 100%; max-height: 300px; border-radius: 8px; border: 1px solid #ddd; }
    .result-text h2 { font-size: 17px; color: #1E2761; margin-bottom: 12px; }
    .analysis-box { background: #f4f6fb; border-left: 4px solid #1E2761; border-radius: 6px; padding: 16px 20px; font-size: 15px; line-height: 1.7; color: #333; white-space: pre-wrap; }
    .error-box { background: #fff0f0; border: 1px solid #ffcccc; border-radius: 8px; padding: 16px; color: #cc0000; margin-bottom: 24px; }
    .back-btn { display: block; width: 100%; padding: 12px; background: #1E2761; color: white; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; text-align: center; text-decoration: none; box-sizing: border-box; transition: background 0.2s; }
    .back-btn:hover { background: #2e3a8a; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🖼️ AI 이미지 분석기</h1>

    {% if error %}
      <div class="error-box">
        <p>⚠️ {{ error }}</p>
      </div>
    {% else %}
      <div class="result-wrap">
        <div class="result-image">
          <img src="{{ image_data_url }}" alt="업로드된 이미지">
          <p class="hint">✅ S3 저장 완료: {{ filename }}</p>
        </div>
        <div class="result-text">
          <h2>🤖 AI 분석 결과</h2>
          <div class="analysis-box">{{ analysis }}</div>
        </div>
      </div>
    {% endif %}

    <a href="/" class="back-btn">← 다른 이미지 분석하기</a>
  </div>
</body>
</html>
