<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>AI 분석 결과</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="container">
    <h1>🖼️ AI 이미지 분석기</h1>

    {% if error %}
      <div class="error-box">
        <p>⚠️ {{ error }}</p>
      </div>
    {% else %}
      <div class="result-wrap">
        <div class="result-image">
          <img src="{{ image_data_url }}" alt="업로드된 이미지">
          <p class="hint">✅ S3 저장 완료: {{ filename }}</p>
        </div>

        <div class="result-text">
          <h2>🤖 AI 분석 결과</h2>
          <div class="analysis-box">
            {{ analysis }}
          </div>
        </div>
      </div>
    {% endif %}

    <a href="/" class="back-btn">← 다른 이미지 분석하기</a>
  </div>
</body>
</html>
