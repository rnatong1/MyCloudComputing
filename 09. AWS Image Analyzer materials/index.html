<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>AI 이미지 분석기</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f6fb; margin: 0; padding: 40px 20px; }
    .container { max-width: 700px; margin: 0 auto; background: white; border-radius: 12px; padding: 40px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    h1 { font-size: 22px; margin-bottom: 4px; color: #1E2761; }
    .subtitle { color: #666; font-size: 14px; margin-bottom: 28px; }
    .upload-area { border: 2px dashed #c0c8e8; border-radius: 10px; padding: 40px 20px; text-align: center; cursor: pointer; transition: background 0.2s, border-color 0.2s; color: #555; margin-bottom: 20px; }
    .upload-area:hover, .upload-area.dragover { background: #eef1fc; border-color: #1E2761; }
    .upload-area input[type="file"] { display: none; }
    .upload-icon { font-size: 40px; margin-bottom: 10px; }
    .hint { font-size: 12px; color: #999; }
    #preview-wrap { text-align: center; margin-bottom: 20px; }
    #preview { max-width: 100%; max-height: 280px; border-radius: 8px; border: 1px solid #ddd; }
    #preview-wrap p { font-size: 13px; color: #666; margin-top: 6px; }
    button[type="submit"] { display: block; width: 100%; padding: 12px; background: #1E2761; color: white; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; transition: background 0.2s; }
    button[type="submit"]:hover { background: #2e3a8a; }
    button[type="submit"]:disabled { background: #aaa; cursor: not-allowed; }
    #loading { flex-direction: column; align-items: center; padding: 30px; color: #555; }
    .spinner { width: 40px; height: 40px; border: 4px solid #ddd; border-top-color: #1E2761; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 14px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <h1>🖼️ AI 이미지 분석기</h1>
    <p class="subtitle">이미지를 업로드하면 Gemini AI가 분석해드립니다</p>

    <form id="uploadForm" action="/upload" method="POST" enctype="multipart/form-data">
      <div class="upload-area" id="uploadArea">
        <div class="upload-icon">📁</div>
        <p>이미지를 드래그하거나 클릭하여 선택하세요</p>
        <p class="hint">JPG, PNG, GIF, WEBP 지원</p>
        <input type="file" id="imageInput" name="image" accept="image/*" required>
      </div>

      <div id="preview-wrap" style="display:none;">
        <img id="preview" src="" alt="미리보기">
        <p id="filename"></p>
      </div>

      <button type="submit" id="submitBtn" disabled>🔍 분석하기</button>
    </form>

    <div id="loading" style="display:none;">
      <div class="spinner"></div>
      <p>AI가 이미지를 분석 중입니다...</p>
    </div>
  </div>

  <script>
    const input = document.getElementById('imageInput');
    const uploadArea = document.getElementById('uploadArea');
    const preview = document.getElementById('preview');
    const previewWrap = document.getElementById('preview-wrap');
    const filenameP = document.getElementById('filename');
    const submitBtn = document.getElementById('submitBtn');
    const form = document.getElementById('uploadForm');
    const loading = document.getElementById('loading');

    uploadArea.addEventListener('click', () => input.click());

    uploadArea.addEventListener('dragover', e => {
      e.preventDefault();
      uploadArea.classList.add('dragover');
    });
    uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
    uploadArea.addEventListener('drop', e => {
      e.preventDefault();
      uploadArea.classList.remove('dragover');
      if (e.dataTransfer.files[0]) {
        input.files = e.dataTransfer.files;
        showPreview(e.dataTransfer.files[0]);
      }
    });

    input.addEventListener('change', () => {
      if (input.files[0]) showPreview(input.files[0]);
    });

    function showPreview(file) {
      const reader = new FileReader();
      reader.onload = e => {
        preview.src = e.target.result;
        previewWrap.style.display = 'block';
        filenameP.textContent = file.name;
        submitBtn.disabled = false;
      };
      reader.readAsDataURL(file);
    }

    form.addEventListener('submit', () => {
      loading.style.display = 'flex';
      submitBtn.disabled = true;
    });
  </script>
</body>
</html>
