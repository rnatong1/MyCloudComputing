<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Gemini 챗봇</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 700px; margin: 40px auto; padding: 0 20px; }
    h1 { font-size: 22px; }
    #chatbox { border: 1px solid #ddd; border-radius: 8px; height: 400px; overflow-y: auto; padding: 16px; margin-bottom: 12px; background: #f9f9f9; }
    .msg { margin-bottom: 12px; }
    .msg.user { text-align: right; }
    .msg.user span { background: #1E2761; color: white; padding: 8px 14px; border-radius: 16px 16px 0 16px; display: inline-block; }
    .msg.bot span { background: #e0e0e0; padding: 8px 14px; border-radius: 16px 16px 16px 0; display: inline-block; }
    #inputarea { display: flex; gap: 8px; }
    #inputarea input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
    #inputarea button { padding: 10px 20px; background: #1E2761; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; }
    #inputarea button:hover { background: #2e3a8a; }
  </style>
</head>
<body>
  <h1>💬 Gemini 챗봇</h1>
  <div id="chatbox"></div>
  <div id="inputarea">
    <input type="text" id="userinput" placeholder="메시지를 입력하세요..." />
    <button onclick="sendMessage()">전송</button>
  </div>

  <script>
    const chatbox = document.getElementById('chatbox');
    const input = document.getElementById('userinput');

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') sendMessage();
    });

    function appendMessage(text, role) {
      const div = document.createElement('div');
      div.className = `msg ${role}`;
      div.innerHTML = `<span>${text}</span>`;
      chatbox.appendChild(div);
      chatbox.scrollTop = chatbox.scrollHeight;
    }

    async function sendMessage() {
      const message = input.value.trim();
      if (!message) return;
      appendMessage(message, 'user');
      input.value = '';

      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message })
      });
      const data = await res.json();
      appendMessage(data.reply, 'bot');
    }
  </script>
</body>
</html>
